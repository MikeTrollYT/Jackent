version: "3.8"

networks:
  jackent-network:
    driver: bridge

services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "7997:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - jackent-network
  
  warp:
    image: caomingjun/warp
    container_name: warp
    restart: always
    ports:
      - 9117:9117
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./warp:/var/lib/cloudflare-warp
    networks:
      - jackent-network
  
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - ./jackett/config:/config
    network_mode: service:warp
    depends_on:
      - warp

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent/config:/config
      - ./qbittorrent/qBittorrent.conf:/config/qBittorrent/qBittorrent.conf
      - ./Descargas:/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    networks:
      - jackent-network

  backend:
    build: ./backend
    restart: always
    environment:
      JACKETT_URL: ${JACKETT_URL:-http://warp:9117}
      JACKETT_API_KEY: ${JACKETT_API_KEY}
      QBITTORRENT_URL: ${QBITTORRENT_URL:-http://qbittorrent:8080}
      QBITTORRENT_USER: ${QBITTORRENT_USER:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
    volumes:
      - ./Descargas:/downloads
    depends_on:
      - qbittorrent
    networks:
      - jackent-network